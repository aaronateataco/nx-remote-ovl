name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - "sysmodule/**"
      - "overlay/**"
      - "client/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build sysmodule
        run: |
          cd sysmodule
          make -j$(nproc)

      - name: Build overlay
        run: |
          cd overlay
          make -j$(nproc)

      - name: Install zip
        run: |
          sudo apt-get update -yq
          sudo apt-get install -yq zip

      - name: Assemble SD card layout
        run: |
          set -e
          TITLE_ID=4200000000000F00
          OUT=dist

          mkdir -p "$OUT/atmosphere/contents/$TITLE_ID/flags"
          cp sysmodule/nx-remote-ovl-sys.nsp "$OUT/atmosphere/contents/$TITLE_ID/exefs.nsp"
          touch "$OUT/atmosphere/contents/$TITLE_ID/flags/boot2.flag"

          mkdir -p "$OUT/switch/.overlays"
          cp overlay/nx-remote-ovl.ovl "$OUT/switch/.overlays/nx-remote-ovl.ovl"

          mkdir -p "$OUT/nx-remote-ovl-client"
          cp client/launcher.py client/config.ini.example "$OUT/nx-remote-ovl-client/"

          cp README.md "$OUT/"

          cd "$OUT" && zip -r ../nx-remote-ovl.zip .

      - name: Bump tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: nx-remote-ovl.zip
